# Surface Pro 11 GPU module options
# These are defaults; bootloader entries can override via modprobe.blacklist=

# Adreno X1-85 / MSM DRM options
# no_hw=0  → allow hardware acceleration (default; set no_hw=1 to disable GPU)
# dma_iova_prefetch=1 → prefetch IOVA mappings for slightly better throughput
options msm no_hw=0 dma_iova_prefetch=1

# NOTE: There is no separate "a6xx_gmu" kernel module — the GMU support is
# compiled into the msm module itself. Do NOT add options for a6xx_gmu here.
# The Adreno X1-85 on X1E80100 is an Adreno 830-class GPU; its firmware blobs
# (a690_sqe.fw, a690_gmu.bin) must be present at /lib/firmware/qcom/x1e80100/
# for the MSM driver to initialise the GPU correctly. See firmware/README below.

# simpledrm: do NOT set force=1 when MSM is active — it causes both drivers to
# attempt to claim the same framebuffer, leading to a black screen or hang.
# simpledrm is only used in safe mode when msm is blacklisted via cmdline.
# options simpledrm force=1   ← intentionally disabled
