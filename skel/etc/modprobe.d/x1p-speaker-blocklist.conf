# Surface Pro 11 (X1E80100) Speaker Protection
# 
# The onboard speakers are driven by Qualcomm WSA smart amps (WSA883X/WSA884X)
# which require ADSP firmware and per-device calibration data to operate safely.
# Without calibration, thermal/current/excursion limiting may not function.
#
# These drivers are blacklisted by default for safety during bringup.
# Once audio is confirmed working with proper firmware, remove this file
# or comment out the relevant lines.
#
# Headphone jack and HDMI/DP audio are unaffected.

# Qualcomm WSA smart speaker amps
blacklist snd-soc-wsa881x
blacklist snd-soc-wsa883x
blacklist snd-soc-wsa884x

# WCD codec (drives speaker path through WSA amps)
blacklist snd-soc-wcd939x
blacklist snd-soc-wcd939x-sdw

# WCD938X (fallback codec on some boards)
blacklist snd-soc-wcd938x
blacklist snd-soc-wcd938x-sdw

# Machine driver depends on above; will fail to probe safely without them
# snd-soc-x1e80100 can remain as a module — it will simply not bind
