# Surface Pro 11 Speaker Protection
# Device uses Qualcomm WSA smart amps (WSA883X/WSA884X)
# which require ADSP firmware + calibration data.
# DO NOT load simple/max amps that lack excursion/thermal limiting.

# Block common simple amps that could be incorrectly probed
blacklist snd_soc_max98357a
blacklist snd_soc_max98390
blacklist snd_soc_max98927
blacklist snd_soc_tas2552
blacklist snd_soc_tas571x

# Block WCD codecs without proper DSP firmware
blacklist snd_soc_wcd9335
blacklist snd_soc_wcd934x
blacklist snd_soc_wcd938x
blacklist snd_soc_wcd939x

# Block WSA amps until ADSP firmware is confirmed loaded
# (These are the CORRECT amps but need firmware first)
blacklist snd_soc_wsa881x
blacklist snd_soc_wsa883x
blacklist snd_soc_wsa884x

# Allow X1E80100 ASoC machine driver but ensure it loads firmware first
options snd_soc_x1e80100 adsp_fw_required=1
