# Dracut configuration for Surface Pro 11 (Snapdragon X Plus)

# Ensure essential modules are included in initramfs
add_dracutmodules+=" drm msm gpu-accel qcom-fw "

# Filesystem support for root
filesystems+=" ext4 vfat fat32 overlay squashfs "

# Include firmware for early boot
fw_dir+=" /lib/firmware/qcom/x1e80100 "

# Drivers for boot from USB/NVMe
drivers+=" nvme usb_storage uas xhci_hcd sdhci sdhci_pci sdhci_msm "

# Compression
compress="zstd"
