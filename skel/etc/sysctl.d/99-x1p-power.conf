# Surface Pro 11 Power Management Defaults
# These are conservative settings that prioritize thermals/battery over raw performance.
# Adjust as needed after boot.

# VM: be more aggressive about swapping idle pages to save RAM power
vm.swappiness=60
vm.vfs_cache_pressure=150

# Scheduler: prefer power efficiency
kernel.sched_energy_aware=1

# Wakeups: reduce timer tick frequency on idle CPUs
kernel.nohz_full=

# Network: disable TCP timestamps and window scaling if not needed
# (minor power saving on Wi-Fi)
net.ipv4.tcp_slow_start_after_idle=1

# Disable NMI watchdog (saves some interrupt overhead)
kernel.nmi_watchdog=0
