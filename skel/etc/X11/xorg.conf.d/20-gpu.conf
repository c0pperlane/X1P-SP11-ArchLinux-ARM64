# Surface Pro 11 — Xorg GPU configuration (static default for hw-accelerated mode)
# This file is overwritten at boot by x1p-render-setup.service based on the
# x1p.render= kernel cmdline parameter. Edit x1p-render-setup.sh to change runtime
# behaviour; edit this file only if you want to change the static fallback.
#
# Driver: modesetting — the standard DRM-KMS driver. Works with any MSM/DRM card.
# AccelMethod: glamor — GPU-accelerated 2D compositing via OpenGL ES.
# DRI 3: required for buffer sharing between MSM kernel driver and Mesa (Freedreno).
# kmsdev: explicitly point at card0 so Xorg doesn't accidentally pick simpledrm.

Section "Device"
    Identifier  "Card0"
    Driver      "modesetting"
    Option      "AccelMethod" "glamor"
    Option      "DRI"         "3"
    Option      "kmsdev"      "/dev/dri/card0"
EndSection
