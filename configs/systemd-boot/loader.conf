# systemd-boot loader configuration
# Surface Pro 11 (Snapdragon X Plus) — Arch Linux ARM

timeout 10
console-mode max
editor yes
default arch-x1p-gpu.conf

# Available boot entries:
#   arch-x1p-gpu.conf        — Default (schedutil governor, GPU accel)
#   arch-x1p-powersave.conf  — Max battery (powersave governor)
#   arch-x1p-software.conf   — Software rendering (LLVMpipe)
#   arch-x1p-safe.conf       — Safe mode (simpledrm fallback)
#   arch-x1p-debug.conf      — Debug shell (verbose)
