# Arch Linux ARM — Surface Pro 11 (Safe Mode)
# GPU kernel modules blacklisted; simpledrm framebuffer fallback + LLVMpipe
# Use this if the display/GPU driver hangs during boot

title   Arch Linux ARM — Safe Mode (simpledrm + LLVMpipe)
linux   /Image
initrd  /initramfs.img
options root=LABEL=ARCH_X1P_ROOT rw rootfstype=ext4 x1p.render=safe modprobe.blacklist=msm,kgsl,ath12k,snd_soc_max98357a,snd_soc_wsa883x,snd_soc_wsa884x,snd_soc_wsa881x quiet loglevel=3 systemd.unit=multi-user.target
