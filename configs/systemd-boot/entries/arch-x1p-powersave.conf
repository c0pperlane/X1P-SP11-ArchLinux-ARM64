# Arch Linux ARM — Surface Pro 11 (Power Saver)
# Forces CPU governor to 'powersave' for maximum battery life.
# Use this for long battery sessions or when thermals are a concern.

title   Arch Linux ARM — Power Saver (min freq, coolest)
linux   /Image
initrd  /initramfs.img
options root=LABEL=ARCH_X1P_ROOT rw rootfstype=ext4 x1p.render=hw quiet loglevel=3 cpufreq.default_governor=powersave modprobe.blacklist=snd_soc_max98357a,snd_soc_wsa883x,snd_soc_wsa884x,snd_soc_wsa881x
