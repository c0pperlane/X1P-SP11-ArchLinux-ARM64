# Arch Linux ARM — Surface Pro 11 (Debug Shell)
# Verbose boot with early debug shell. No quiet mode.
# Drops to emergency shell if boot fails.

title   Arch Linux ARM — Debug Shell
linux   /Image
initrd  /initramfs.img
options root=LABEL=ARCH_X1P_ROOT rw rootfstype=ext4 x1p.render=hw debug rd.shell rd.debug systemd.log_level=debug systemd.log_target=console loglevel=7 ignore_loglevel modprobe.blacklist=snd_soc_max98357a,snd_soc_wsa883x,snd_soc_wsa884x,snd_soc_wsa881x
