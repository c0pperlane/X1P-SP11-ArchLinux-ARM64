name: Build SP11 Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'configs/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu make flex bison bc libssl-dev \
            kmod cpio curl libarchive-tools gdisk dosfstools \
            e2fsprogs qemu-user-static mtools \
            rsync cloud-guest-utils

      # The runner pre-registers a dynamic aarch64 binfmt handler
      # (aarch64-binfmt-P) that cannot resolve the guest loader inside a
      # chroot. Drop every existing aarch64/qemu handler and register the
      # STATIC qemu directly with the F (fix-binary) flag, which works in chroot.
      - name: Register static qemu-aarch64 (F flag) for chroot
        run: |
          for f in /proc/sys/fs/binfmt_misc/*; do
            b=$(basename "$f")
            [ "$b" = register ] && continue
            [ "$b" = status ] && continue
            if grep -qiE 'aarch64|arm64|qemu' "$f" 2>/dev/null; then
              echo "disabling stale handler: $b"
              echo -1 | sudo tee "$f" >/dev/null 2>&1 || true
            fi
          done
          MAGIC='\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00'
          MASK='\xff\xff\xff\xff\xff\xff\xff\x00\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff'
          printf '%s' ":qemu-aarch64-sp11:M::${MAGIC}:${MASK}:/usr/bin/qemu-aarch64-static:OCF" \
            | sudo tee /proc/sys/fs/binfmt_misc/register >/dev/null
          echo "--- active aarch64 handler ---"
          sudo cat /proc/sys/fs/binfmt_misc/qemu-aarch64-sp11

      # Cache the kernel outputs so iterations don't rebuild the kernel (~34 min)
      # unless the kernel scripts/config change. Split restore/save so the cache
      # is saved right after a successful kernel build even if a later step fails.
      - name: Restore kernel cache
        id: kcache
        uses: actions/cache/restore@v4
        with:
          path: |
            build/boot
            build/kernel-modules-*.tar.gz
          key: sp11-kernel-${{ hashFiles('scripts/build-kernel.sh', 'scripts/env.sh', 'configs/**') }}

      - name: Build Kernel
        if: steps.kcache.outputs.cache-hit != 'true'
        run: sudo bash scripts/build-kernel.sh

      - name: Save kernel cache
        if: steps.kcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            build/boot
            build/kernel-modules-*.tar.gz
          key: sp11-kernel-${{ hashFiles('scripts/build-kernel.sh', 'scripts/env.sh', 'configs/**') }}

      - name: Download Arch Linux ARM RootFS
        run: |
          sudo mkdir -p cache
          sudo curl -L -o cache/archlinuxarm-aarch64-latest.tar.gz http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz

      - name: Build USB Image
        run: sudo bash scripts/build-usb-image.sh

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sp11-i3-image
          path: build/sp11-i3.img
          compression-level: 1
