# Arch Linux ARM — Surface Pro 11 (Debug Shell)
# Verbose boot with early debug shell. No quiet mode.
# Drops to emergency shell if boot fails.
# earlyprintk=efi + console=tty0 ensures messages appear before any driver loads.
# panic=10 gives 10 s to read the panic message before automatic reboot.

title   Arch Linux ARM — Debug Shell
linux   /Image
initrd  /initramfs.img
devicetree /dtbs/qcom/x1e80100-microsoft-romulus13.dtb
options root=LABEL=ARCH_X1P_ROOT rw rootfstype=ext4 x1p.render=hw \
        debug rd.shell rd.debug \
        systemd.log_level=debug systemd.log_target=console \
        loglevel=8 ignore_loglevel no_console_suspend \
        earlyprintk=efi console=tty0 \
        panic=10 \
        modprobe.blacklist=snd_soc_max98357a,snd_soc_wsa883x,snd_soc_wsa884x,snd_soc_wsa881x
