# Arch Linux ARM — Surface Pro 11 (GPU Accelerated)
# Full Adreno X1-85 hardware acceleration via Mesa Freedreno

title   Arch Linux ARM — GPU Accelerated
linux   /Image
initrd  /initramfs.img
devicetree /dtbs/qcom/x1e80100-microsoft-denali.dtb
options root=LABEL=ARCH_X1P_ROOT rw rootfstype=ext4 x1p.render=hw quiet splash loglevel=3 \
        clk_ignore_unused pd_ignore_unused \
        earlyprintk=efi console=tty0 \
        panic=10 \
        modprobe.blacklist=snd_soc_max98357a,snd_soc_wsa883x,snd_soc_wsa884x,snd_soc_wsa881x
