# Arch Linux ARM — Surface Pro 11 (Software Rendering)
# MSM display driver active, but Mesa forced to LLVMpipe (CPU software render)
# Use this if GPU acceleration is unstable or for debugging graphics issues

title   Arch Linux ARM — Software Rendering (LLVMpipe)
linux   /Image
initrd  /initramfs.img
devicetree /dtbs/qcom/x1e80100-microsoft-romulus13.dtb
options root=LABEL=ARCH_X1P_ROOT rw rootfstype=ext4 x1p.render=sw quiet loglevel=3 \
        earlyprintk=efi console=tty0 \
        panic=10 \
        modprobe.blacklist=snd_soc_max98357a,snd_soc_wsa883x,snd_soc_wsa884x,snd_soc_wsa881x
