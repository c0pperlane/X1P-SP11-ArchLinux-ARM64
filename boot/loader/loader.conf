# systemd-boot loader configuration
# Surface Pro 11 (Snapdragon X Plus) - Arch Linux ARM
# DTB: x1e80100-microsoft-denali.dtb | Kernel: 6.17.0-sp11

timeout 20
console-mode max
editor yes
default arch-x1p-console.conf

# Available boot entries:
#   arch-x1p-console.conf    - Text login on simpledrm (multi-user.target)  [DEFAULT]
#   arch-x1p-rescue.conf     - Instant root shell (init=/bin/bash) for debugging
#   arch-x1p-gpu.conf        - GPU accel via msm native display - experimental
#   arch-x1p-safe.conf       - Safe mode (simpledrm fallback)
#   arch-x1p-debug.conf      - Debug (verbose)
#   arch-x1p-software.conf   - Software rendering (LLVMpipe)
#   arch-x1p-powersave.conf  - Power saver (min freq governor)
#
# CRITICAL: All entries MUST have clk_ignore_unused pd_ignore_unused
#           All entries MUST use devicetree /dtbs/qcom/x1e80100-microsoft-denali.dtb
